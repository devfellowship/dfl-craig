services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: craig
      POSTGRES_DB: craig
      POSTGRES_USER: craig
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U craig"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal

  craig:
    build:
      context: .
      dockerfile: dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_started
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_APP_ID=${DISCORD_APP_ID}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - RECORDING_WEBHOOK_URL=${RECORDING_WEBHOOK_URL}
      - RECORDING_WEBHOOK_SECRET=${RECORDING_WEBHOOK_SECRET}
      - API_PORT=5029
      - API_HOST=0.0.0.0
      - API_HOMEPAGE=https://dfl-transcription.devfellowship.com/
      - ENNUIZEL_BASE=https://ez.craig.horse/
      - SERVER_NAME=dfl
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://craig:craig@db:5432/craig?schema=public
      - NODE_VERSION=18.18.2
      - DATABASE_NAME=craig
      - POSTGRESQL_USER=craig
      - POSTGRESQL_PASSWORD=craig
      - PATREON_CLIENT_ID=unused
      - PATREON_CLIENT_SECRET=unused
      - PATRON_TIER_MAP={}
      - PATREON_WEBHOOK_SECRET=unused
      - GOOGLE_CLIENT_ID=unused
      - GOOGLE_CLIENT_SECRET=unused
      - MICROSOFT_CLIENT_ID=unused
      - MICROSOFT_CLIENT_SECRET=unused
      - DROPBOX_CLIENT_ID=unused
      - DROPBOX_CLIENT_SECRET=unused
      - APP_URI=http://localhost:3000
      - JWT_SECRET=dfl-craig-jwt
    volumes:
      - craig_rec:/app/rec
    networks:
      - internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.craig-download.rule=Host(`dfl-transcription.devfellowship.com`)"
      - "traefik.http.routers.craig-download.entrypoints=websecure"
      - "traefik.http.routers.craig-download.tls.certresolver=letsencrypt"
      - "traefik.http.routers.craig-download.service=craig-download-svc"
      - "traefik.http.services.craig-download-svc.loadbalancer.server.port=5029"

  cleanup-old-stack:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: sh -c "docker stack rm dfl-craig 2>/dev/null; echo 'Old stack removed'; sleep 5"
    restart: "no"

volumes:
  db_data:
  craig_rec:

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
