services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: craig
      POSTGRES_DB: craig
      POSTGRES_USER: craig
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U craig"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal

  craig:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_started
    volumes:
      - craig_rec:/app/rec
      - ./install.config:/app/install.config:ro
    networks:
      - internal
      - network_public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=network_public"
      # Download app (port 5029)
      - "traefik.http.routers.craig-download.rule=Host(`craig.devfellowship.com`)"
      - "traefik.http.routers.craig-download.entrypoints=websecure"
      - "traefik.http.routers.craig-download.tls.certresolver=letsencrypt"
      - "traefik.http.routers.craig-download.service=craig-download-svc"
      - "traefik.http.services.craig-download-svc.loadbalancer.server.port=5029"

volumes:
  db_data:
  craig_rec:

networks:
  internal:
    driver: bridge
  network_public:
    external: true
